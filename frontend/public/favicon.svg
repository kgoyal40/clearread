  <path d="M13 9 A7 7 0 1 0 13 23" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- "R" shape — vertical bar + bump + leg -->
  <line x1="19" y1="9" x2="19" y2="23" stroke="#a89ff0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M19 9 Q26 9 26 14 Q26 18 19 18" fill="none" stroke="#a89ff0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="21" y1="18" x2="26" y2="23" stroke="#a89ff0" stroke-width="2.5" stroke-linecap="round"/>
</svg>
