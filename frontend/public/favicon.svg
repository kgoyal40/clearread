<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0F6E56"/>

  <!-- "C" shape — teal on dark teal, drawn with paths -->
